# Production Docker Compose for Hoard
# Designed for deployment on Synology NAS
#
# Usage:
#   docker-compose -f docker-compose.prod.yml --env-file .env.production up -d

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=${APP_URL:-https://hoard.home}
    container_name: hoard_app
    environment:
      - DATABASE_URL=/app/data/hoard.db
      - STEAM_API_KEY=${STEAM_API_KEY}
      - STEAM_USER_ID=${STEAM_USER_ID}
      - ITAD_API_KEY=${ITAD_API_KEY:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DISCORD_OPS_WEBHOOK_URL=${DISCORD_OPS_WEBHOOK_URL:-}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-https://hoard.home}
      - CRON_PRICE_CHECK=${CRON_PRICE_CHECK:-0 */12 * * *}
      - CRON_LIBRARY_SYNC=${CRON_LIBRARY_SYNC:-0 3 * * *}
      - CRON_BACKUP=${CRON_BACKUP:-0 4 * * *}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${APP_URL:-https://hoard.home}
    volumes:
      - hoard_data:/app/data
      - ${BACKUP_PATH:-./backups}:/app/data/backups
    ports:
      - "3001:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  hoard_data:
    name: hoard_data
